apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: postgres-operator-role
rules:
  # Manage the CRD instances
  - apiGroups: ["databases.example.io"]
    resources: ["postgresdatabases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["databases.example.io"]
    resources: ["postgresdatabases/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["databases.example.io"]
    resources: ["postgresdatabases/finalizers"]
    verbs: ["update"]

  # Manage StatefulSets
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Manage Services and Secrets
  - apiGroups: [""]
    resources: ["services", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Emit Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
